<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Tier List</title>
<style>
  :root{
    --bg:#11131a; --panel:#191c26; --panel2:#212533; --line:#2c3142;
    --text:#e8eaf2; --muted:#9aa0b5; --accent:#6c8cff; --danger:#ff5d6c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:12px 16px; border-bottom:1px solid var(--line); background:var(--panel);
    position:sticky; top:0; z-index:20;
  }
  #title{
    font-size:18px; font-weight:700; background:transparent; border:none; color:var(--text);
    padding:4px 6px; border-radius:6px; min-width:120px; max-width:46vw;
  }
  #title:focus{outline:none; background:var(--panel2)}
  .spacer{flex:1}
  button.btn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    padding:7px 12px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600;
  }
  button.btn:hover{border-color:var(--accent)}
  button.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  #status{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:#888}
  .dot.live{background:#3ad17a} .dot.warn{background:#ffb454} .dot.off{background:#ff5d6c}

  main{padding:14px 16px 120px; max-width:1100px; margin:0 auto}

  .tier{
    display:flex; align-items:stretch; margin-bottom:10px; border-radius:10px;
    overflow:hidden; border:1px solid var(--line); background:var(--panel);
  }
  .tier-label{
    width:96px; min-width:96px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:6px; padding:10px 6px; color:#1a1a1a; font-weight:800;
    text-align:center; position:relative;
  }
  .tier-name{
    width:100%; background:transparent; border:none; text-align:center; font-weight:800;
    font-size:20px; color:inherit; padding:2px; border-radius:5px;
  }
  .tier-name:focus{outline:none; background:rgba(255,255,255,.35)}
  .tier-tools{display:flex; gap:4px; opacity:.55}
  .tier:hover .tier-tools{opacity:1}
  .tier-tools button{
    border:none; background:rgba(0,0,0,.18); color:#1a1a1a; width:22px;height:22px;
    border-radius:5px; cursor:pointer; font-size:12px; line-height:1; display:flex;
    align-items:center; justify-content:center; font-weight:700;
  }
  .tier-tools button:hover{background:rgba(0,0,0,.35)}
  .tier-tools input[type=color]{
    width:22px;height:22px;border:none;background:none;padding:0;cursor:pointer;border-radius:5px;
  }
  .drop{
    flex:1; display:flex; flex-wrap:wrap; align-content:flex-start; gap:8px;
    padding:10px; min-height:72px; background:var(--panel);
  }
  .drop.over{background:var(--panel2); outline:2px dashed var(--accent); outline-offset:-4px}

  .chip{
    display:flex; align-items:center; gap:6px; background:var(--panel2);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; cursor:grab;
    user-select:none; max-width:240px;
  }
  .chip:active{cursor:grabbing}
  .chip.dragging{opacity:.4}
  .chip .txt{white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .chip .txt[contenteditable=true]{outline:none; background:#0e1016; padding:2px 4px; border-radius:4px; cursor:text}
  .chip .x{
    color:var(--muted); cursor:pointer; font-weight:700; opacity:0; transition:.12s; padding:0 2px;
  }
  .chip:hover .x{opacity:.7}
  .chip .x:hover{color:var(--danger); opacity:1}
  .chip .add{font-size:13px;color:var(--muted)}

  .addchip{
    border:1px dashed var(--line); background:transparent; color:var(--muted);
    border-radius:8px; padding:8px 10px; cursor:text; min-width:60px;
  }
  .addchip:focus{outline:none;border-color:var(--accent);color:var(--text)}

  .pool{
    margin-top:18px; border:1px solid var(--line); border-radius:10px; background:var(--panel);
  }
  .pool h3{margin:0; padding:9px 12px; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--line)}
  .pool .drop{min-height:90px}

  #trash{
    position:fixed; right:18px; bottom:18px; width:120px; height:64px; border-radius:12px;
    border:2px dashed var(--line); display:flex; align-items:center; justify-content:center;
    gap:8px; color:var(--muted); background:rgba(25,28,38,.9); font-size:13px; font-weight:600;
    z-index:15; backdrop-filter:blur(4px);
  }
  #trash.over{border-color:var(--danger); color:var(--danger); background:rgba(40,20,24,.95)}

  .hint{color:var(--muted); font-size:12.5px; margin:8px 2px 0}
  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:#0c0e14; border:1px solid var(--line); padding:9px 14px; border-radius:8px;
    font-size:13px; z-index:50; opacity:0; transition:.2s; pointer-events:none;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
  <header>
    <input id="title" value="Tier List" spellcheck="false" />
    <span id="status"><span class="dot" id="dot"></span><span id="statusText">Connecting…</span></span>
    <span class="spacer"></span>
    <button class="btn" id="addTier">+ Tier</button>
    <button class="btn primary" id="share">Share link</button>
  </header>

  <main>
    <div id="board"></div>
    <div class="pool">
      <h3>Item pool — click “+ add” then type, drag into a tier</h3>
      <div class="drop" id="pool" data-tier="pool"></div>
    </div>
    <p class="hint">Tip: double-click an item to rename it. Click a tier’s name to rename it, the swatch to recolor. Anyone with the link edits live — no account needed.</p>
  </main>

  <div id="trash" data-trash="1">🗑️ Drag here to delete</div>
  <div class="toast" id="toast"></div>

  <!-- minimal polyfills some bundled webrtc deps expect in the browser -->
  <script>window.global=window; window.process=window.process||{env:{},nextTick:function(f){setTimeout(f,0)}};</script>

  <script type="module">
    import * as Y from 'https://esm.sh/yjs@13.6.20';
    import { WebrtcProvider } from 'https://esm.sh/y-webrtc@10.3.0?deps=yjs@13.6.20';
    import { IndexeddbPersistence } from 'https://esm.sh/y-indexeddb@9.0.12?deps=yjs@13.6.20';

    /* ----- signaling servers -----
       Public default below can be flaky. For rock-solid sync, run your own
       (free) signaling server and replace the list, e.g. ['wss://your-server']
       or append ?signal=wss://your-server to the page URL.                    */
    const params = new URLSearchParams(location.search);
    const SIGNALING = params.get('signal')
      ? params.get('signal').split(',')
      : ['wss://signaling.yjs.dev'];

    /* ICE servers: STUN + a free public TURN relay so two people on DIFFERENT
       networks (different wifi / mobile data) can actually connect. TURN is the
       relay that gets through firewalls and strict routers.                     */
    const ICE = { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:openrelay.metered.ca:80' },
      { urls: 'turn:openrelay.metered.ca:80',  username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ]};

    /* ----- room: taken from the URL hash so the link is the shared board ----- */
    let room = location.hash.slice(1);
    const isNewBoard = !room;
    if (isNewBoard) {
      room = 'tl-' + Math.random().toString(36).slice(2, 10);
      history.replaceState(null, '', '#' + room);
    }

    /* ----- Yjs document + persistence + P2P sync ----- */
    const ydoc = new Y.Doc();
    const idb = new IndexeddbPersistence('tierlist-' + room, ydoc);
    const provider = new WebrtcProvider(room, ydoc, { signaling: SIGNALING, peerOpts: { config: ICE } });

    const yTiers = ydoc.getArray('tiers');   // [ Y.Map{id,name,color} ] order = tier order
    const yItems = ydoc.getMap('items');     // id -> Y.Map{text,tier,order}
    const yMeta  = ydoc.getMap('meta');      // title

    const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 't' + Date.now() + Math.random().toString(36).slice(2));

    /* ----- presence ----- */
    const colors = ['#ff7676','#ffb454','#ffe357','#7ee787','#7cc7ff','#c792ea','#ff9ecd'];
    const me = { name: 'Guest', color: colors[Math.floor(Math.random()*colors.length)] };
    provider.awareness.setLocalStateField('user', me);

    /* ===================== rendering ===================== */
    const board = document.getElementById('board');
    const pool = document.getElementById('pool');
    let dragId = null;
    let suppressRender = false; // while an inline field is focused

    function tiersSorted(){ return yTiers.toArray(); }
    function itemsFor(tierId){
      const out = [];
      yItems.forEach((m, id) => { if (m.get('tier') === tierId) out.push({ id, m }); });
      out.sort((a,b) => (a.m.get('order') ?? 0) - (b.m.get('order') ?? 0));
      return out;
    }

    function makeChip(id, m){
      const chip = document.createElement('div');
      chip.className = 'chip'; chip.draggable = true; chip.dataset.id = id;
      const txt = document.createElement('span');
      txt.className = 'txt'; txt.textContent = m.get('text') || '';
      const x = document.createElement('span');
      x.className = 'x'; x.textContent = '✕'; x.title = 'Delete';
      x.onclick = (e) => { e.stopPropagation(); yItems.delete(id); };
      chip.append(txt, x);

      chip.addEventListener('dragstart', e => {
        dragId = id; chip.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', id);
      });
      chip.addEventListener('dragend', () => { dragId = null; chip.classList.remove('dragging'); clearOver(); });

      chip.addEventListener('dblclick', () => {
        txt.contentEditable = 'true'; txt.dataset.editing = '1'; suppressRender = true;
        const r = document.createRange(); r.selectNodeContents(txt);
        const s = getSelection(); s.removeAllRanges(); s.addRange(r); txt.focus();
      });
      const commit = () => {
        txt.contentEditable = 'false'; delete txt.dataset.editing; suppressRender = false;
        const v = txt.textContent.trim();
        if (v) m.set('text', v); else yItems.delete(id);
        render();
      };
      txt.addEventListener('blur', commit);
      txt.addEventListener('keydown', e => {
        if (e.key === 'Enter'){ e.preventDefault(); txt.blur(); }
        if (e.key === 'Escape'){ txt.textContent = m.get('text')||''; txt.blur(); }
      });
      return chip;
    }

    function makeAddChip(tierId){
      const a = document.createElement('div');
      a.className = 'addchip'; a.contentEditable = 'true'; a.dataset.editing = '1';
      a.textContent = '+ add';
      a.addEventListener('focus', () => {
        suppressRender = true;
        if (a.textContent === '+ add') a.textContent = '';
      });
      a.addEventListener('keydown', e => {
        if (e.key === 'Enter'){
          e.preventDefault();
          const v = a.textContent.trim();
          if (v){ addItem(v, tierId); a.textContent = ''; }
        }
        if (e.key === 'Escape'){ a.textContent = ''; a.blur(); }
      });
      a.addEventListener('blur', () => {
        const v = a.textContent.trim();
        suppressRender = false;
        if (v){ addItem(v, tierId); }
        render();
      });
      return a;
    }

    function addItem(text, tierId){
      const m = new Y.Map();
      const existing = itemsFor(tierId);
      const order = existing.length ? (existing[existing.length-1].m.get('order') ?? 0) + 1 : 0;
      ydoc.transact(() => {
        m.set('text', text); m.set('tier', tierId); m.set('order', order);
        yItems.set(uid(), m);
      });
    }

    function clearOver(){ document.querySelectorAll('.drop.over,#trash.over').forEach(e=>e.classList.remove('over')); }

    function wireDrop(el, tierId){
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('over'); e.dataTransfer.dropEffect='move'; });
      el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('over'); });
      el.addEventListener('drop', e => {
        e.preventDefault(); el.classList.remove('over');
        const id = dragId || e.dataTransfer.getData('text/plain');
        const m = yItems.get(id); if (!m) return;
        // figure insertion order based on cursor position among existing chips
        const chips = [...el.querySelectorAll('.chip')].filter(c => c.dataset.id !== id);
        let before = null;
        for (const c of chips){
          const r = c.getBoundingClientRect();
          if (e.clientY < r.top + r.height/2 || (Math.abs(e.clientY-(r.top+r.height/2))<40 && e.clientX < r.left + r.width/2)){ before=c; break; }
        }
        const sorted = itemsFor(tierId).filter(o => o.id !== id);
        let newOrder;
        if (!sorted.length){ newOrder = 0; }
        else if (!before){ newOrder = (sorted[sorted.length-1].m.get('order') ?? 0) + 1; }
        else {
          const idx = sorted.findIndex(o => o.id === before.dataset.id);
          const after = idx>0 ? (sorted[idx-1].m.get('order') ?? 0) : (sorted[0].m.get('order') ?? 0) - 1;
          const cur = sorted[idx].m.get('order') ?? 0;
          newOrder = (after + cur) / 2;
        }
        ydoc.transact(() => { m.set('tier', tierId); m.set('order', newOrder); });
      });
    }

    function makeTier(tMap, index){
      const tier = document.createElement('div'); tier.className='tier';
      const color = tMap.get('color') || '#888';
      const label = document.createElement('div');
      label.className='tier-label'; label.style.background = color;

      const name = document.createElement('input');
      name.className='tier-name'; name.value = tMap.get('name') || '';
      name.spellcheck=false; name.dataset.editing='1';
      name.addEventListener('focus', ()=>{ suppressRender=true; });
      name.addEventListener('blur', ()=>{ suppressRender=false; tMap.set('name', name.value); render(); });
      name.addEventListener('keydown', e=>{ if(e.key==='Enter') name.blur(); });

      const tools = document.createElement('div'); tools.className='tier-tools';
      const colorIn = document.createElement('input'); colorIn.type='color'; colorIn.value = toHex(color); colorIn.title='Color';
      colorIn.addEventListener('input', ()=>{ tMap.set('color', colorIn.value); label.style.background=colorIn.value; });
      const up = btn('↑','Move up', ()=>moveTier(index,-1));
      const dn = btn('↓','Move down', ()=>moveTier(index, 1));
      const del = btn('✕','Delete tier', ()=>deleteTier(tMap));
      tools.append(colorIn, up, dn, del);
      label.append(name, tools);

      const drop = document.createElement('div'); drop.className='drop'; drop.dataset.tier = tMap.get('id');
      itemsFor(tMap.get('id')).forEach(o => drop.appendChild(makeChip(o.id, o.m)));
      drop.appendChild(makeAddChip(tMap.get('id')));
      wireDrop(drop, tMap.get('id'));

      tier.append(label, drop);
      return tier;
    }

    function btn(label, title, fn){
      const b=document.createElement('button'); b.textContent=label; b.title=title;
      b.onclick=(e)=>{e.stopPropagation();fn();}; return b;
    }
    function toHex(c){
      if(/^#([0-9a-f]{6})$/i.test(c)) return c;
      const d=document.createElement('div'); d.style.color=c; document.body.appendChild(d);
      const m=getComputedStyle(d).color.match(/\d+/g); d.remove();
      if(!m) return '#888888';
      return '#'+m.slice(0,3).map(n=>(+n).toString(16).padStart(2,'0')).join('');
    }

    function moveTier(i, dir){
      const j=i+dir; if(j<0||j>=yTiers.length) return;
      const arr=yTiers.toArray();
      const a=cloneTier(arr[i]), b=cloneTier(arr[j]);
      ydoc.transact(()=>{
        yTiers.delete(Math.max(i,j),1); yTiers.delete(Math.min(i,j),1);
        const first = Math.min(i,j);
        if(dir<0){ yTiers.insert(first,[a,b]); } else { yTiers.insert(first,[b,a]); }
      });
    }
    function cloneTier(m){ const n=new Y.Map(); n.set('id',m.get('id')); n.set('name',m.get('name')); n.set('color',m.get('color')); return n; }

    function deleteTier(tMap){
      const id=tMap.get('id');
      if(!confirm('Delete this tier? Its items move to the pool.')) return;
      ydoc.transact(()=>{
        yItems.forEach(m=>{ if(m.get('tier')===id) m.set('tier','pool'); });
        const i=yTiers.toArray().findIndex(t=>t.get('id')===id);
        if(i>=0) yTiers.delete(i,1);
      });
    }

    function addTier(){
      const m=new Y.Map();
      ydoc.transact(()=>{
        m.set('id',uid()); m.set('name','New'); m.set('color', colors[yTiers.length % colors.length]);
        yTiers.push([m]);
      });
    }

    function render(){
      if (suppressRender) return;
      board.innerHTML='';
      tiersSorted().forEach((t,i)=> board.appendChild(makeTier(t,i)));
      pool.innerHTML='';
      itemsFor('pool').forEach(o=> pool.appendChild(makeChip(o.id,o.m)));
      pool.appendChild(makeAddChip('pool'));
      const titleEl=document.getElementById('title');
      const t=yMeta.get('title'); if(t!==undefined && document.activeElement!==titleEl) titleEl.value=t;
    }

    wireDrop(pool,'pool');

    // trash drop zone
    const trash=document.getElementById('trash');
    trash.addEventListener('dragover', e=>{e.preventDefault();trash.classList.add('over');});
    trash.addEventListener('dragleave', ()=>trash.classList.remove('over'));
    trash.addEventListener('drop', e=>{
      e.preventDefault(); trash.classList.remove('over');
      const id=dragId||e.dataTransfer.getData('text/plain'); if(id) yItems.delete(id);
    });

    /* ----- observers ----- */
    yTiers.observeDeep(()=>render());
    yItems.observeDeep(()=>render());
    yMeta.observe(()=>render());

    /* ----- header controls ----- */
    document.getElementById('addTier').onclick=addTier;
    const titleEl=document.getElementById('title');
    titleEl.addEventListener('input', ()=> yMeta.set('title', titleEl.value));
    document.getElementById('share').onclick=async()=>{
      try{ await navigator.clipboard.writeText(location.href); toast('Link copied — share it to edit together'); }
      catch{ toast(location.href); }
    };

    /* ----- connection status ----- */
    const dot=document.getElementById('dot'), statusText=document.getElementById('statusText');
    function peers(){ return provider.awareness.getStates().size; }
    function signalingUp(){ try{ return provider.signalingConns.some(c=>c.connected);}catch{return false;} }
    function updateStatus(){
      const n=peers();
      if(signalingUp()){
        dot.className='dot live';
        statusText.textContent = n>1 ? `Live · ${n} online` : 'Live · just you';
      } else {
        dot.className='dot warn'; statusText.textContent='Connecting…';
      }
    }
    provider.awareness.on('change', updateStatus);
    setInterval(updateStatus, 1500);
    setTimeout(()=>{ if(!signalingUp()){ dot.className='dot off'; statusText.textContent='Can’t reach sync server — turn off VPN & reload'; } }, 9000);

    /* ----- seed defaults for a brand-new board only ----- */
    idb.whenSynced.then(()=>{
      setTimeout(()=>{
        if(isNewBoard && yTiers.length===0){
          const defs=[['S','#ff7676'],['A','#ffb454'],['B','#ffe357'],['C','#7ee787'],['D','#7cc7ff']];
          ydoc.transact(()=>{
            defs.forEach(([nm,co])=>{ const m=new Y.Map(); m.set('id',uid()); m.set('name',nm); m.set('color',co); yTiers.push([m]); });
            yMeta.set('title','Tier List');
          });
        }
        render(); updateStatus();
      }, 600);
    });

    function toast(msg){
      const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
      clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),2200);
    }

    render(); updateStatus();
  </script>
</body>
</html>
